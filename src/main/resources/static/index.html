<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do API Test</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/todoListStyles.css">
</head>
    <body>
        <h1>To Do List</h1>
        <button onclick="fetchTasks()">Get All Tasks</button>
        <button onclick="showCheckboxesOnSelect()">Select</button>
        <div id="categoriesDropdown" class="dropdown"></div>
        <button onclick="deleteSelectedTasks()">Delete Tasks</button>
        <div id="tasks"></div>
        <div id="deletedSelectedTasksMessage"></div>

        <p>Add Category</p>
        <input type="text" id="categoryName" placeholder="New Category" required>
        <button onclick="addCategory()">Add</button>
        <div id="categoryNotCreatedMessage"></div>
        <div id="categoryCreatedMessage"></div>

        <p>Fetch Task By Task ID</p>
        <input type="text" id="taskId" placeholder="Task ID" required>
        <button onclick="fetchTaskById()">Go</button>
        <p>Task Details:</p>
        <div id="fetchedTask"></div>

        <p>Delate Task</p>
        <input type="text" id="taskIdToDelete" placeholder="Task ID" required>
        <button onclick="deleteTask()">Delete</button>
        <div id="deleteMessage"></div>

        <h2>Create Task</h2>
        <form id="taskForm">
            <input type="text" id="title" placeholder="Title" required/><br/>
            <textarea id="description" placeholder="Description" required></textarea><br/>
            <input type="date" id="dueDate" name="Due Date" placeholder="Due Date" required> <br/>
            <label for="selectCategory">Category:</label>
            <select id="selectCategory" required>
                <option value="">-- Select Category --</option>
            </select>
            <button type="submit">Create Task</button>
            <div id="taskCreatedMessage"></div>
            <div id="taskNotCreatedMessage"></div>
        </form>
        <script src="scripts/todoListScript.js"></script>
    </body>
</html>
